apiVersion: v1
kind: Pod
metadata:
  name: grok
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
      lifecycle:
        postStart:
          exec:
            command:
              - sh
              - -c
              - |
                STATE=$(((RANDOM % $((2 - 0))) + 0))

                if [[ $STATE -eq "1" ]]; then
                    echo "yes" > /usr/share/nginx/html/grok
                elif [[ $STATE -eq "0" ]]; then
                    echo "no" > /usr/share/nginx/html/grok
                fi
        preStop:
          exec:
            command:
                - sh
                - -c
                - echo "he couldn't handle the truth!"
